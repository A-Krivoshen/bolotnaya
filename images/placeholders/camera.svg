<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" fill="none" aria-hidden="true">
  <!-- Clean modern camera placeholder (2026 strict design) -->
  <rect width="640" height="400" rx="8" fill="#111"/>
  
  <!-- Camera body -->
  <rect x="80" y="90" width="480" height="220" rx="12" fill="#1f1f1f" stroke="#333" stroke-width="2"/>
  
  <!-- Lens housing -->
  <circle cx="320" cy="200" r="78" fill="#0a0a0a" stroke="#444" stroke-width="8"/>
  <circle cx="320" cy="200" r="52" fill="#222" stroke="#555" stroke-width="3"/>
  
  <!-- Inner lens details -->
  <circle cx="320" cy="200" r="28" fill="#111"/>
  <circle cx="320" cy="200" r="12" fill="#333"/>
  
  <!-- Flash / top detail -->
  <rect x="240" y="70" width="160" height="14" rx="3" fill="#2a2a2a"/>
  <circle cx="380" cy="77" r="4" fill="#555"/>
  
  <!-- Subtle grid lines for "screen" feel -->
  <line x1="120" y1="140" x2="520" y2="140" stroke="#222" stroke-width="1"/>
  <line x1="120" y1="260" x2="520" y2="260" stroke="#222" stroke-width="1"/>
</svg>