{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02.01.2006" }}</time>
      {{ with .Params.tags }}
        <div class="post-tags">
          {{ range . }}
            <span class="post-tag">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>
</article>
{{ end }}
