baseURL = "https://www.bolotnaya.online/"
defaultContentLanguage = "ru"
defaultContentLanguageInSubdir = true
title = "Bolotnaya Online — Болотная: Якиманка"
theme = "PaperMod"
enableRobotsTXT = false # static/robots.txt is the source of truth
enableGitInfo = false
canonifyURLs = false
relativeURLs = false
disableHugoGeneratorInject = false
summaryLength = 40
timeout = "60s"

[pagination]
  pagerSize = 12

[imaging]
  quality = 85
  resampleFilter = "Lanczos"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5

[taxonomies]
  tag = "tags"
  category = "categories"

[languages]
  [languages.ru]
    label = "Русский"
    locale = "ru-RU"
    contentDir = "content/ru"
    weight = 1
    title = "Bolotnaya Online — Болотная: Якиманка"
    [languages.ru.params]
      description = "Онлайн-камеры, история и фото Болотной площади и района Якиманка. Open-source проект местного жителя."
      keywords = ["Болотная площадь", "Якиманка", "онлайн камеры", "Москва", "трансляция", "история Москвы", "live camera"]
      homeInfoTitle = "Якиманка: камеры и история"
      homeInfoDescription = "Онлайн-камеры, фото и рассказы о районе Якиманка"

    [languages.ru.menu]
      [[languages.ru.menu.main]]
        name   = "Камеры"
        url    = "/ru/cameras/"
        weight = 1
      [[languages.ru.menu.main]]
        name   = "История"
        url    = "/ru/history/"
        weight = 2
      [[languages.ru.menu.main]]
        name   = "Фото"
        url    = "/ru/galleries/"
        weight = 3
      [[languages.ru.menu.main]]
        name   = "Блог"
        url    = "/ru/posts/"
        weight = 4

  [languages.en]
    label = "English"
    locale = "en-US"
    contentDir = "content/en"
    weight = 2
    title = "Bolotnaya Online — Yakimanka live cameras"
    [languages.en.params]
      description = "Live cameras, history and photos of Bolotnaya Square and Yakimanka district in Moscow. Open-source local project."
      keywords = ["Bolotnaya Square", "Yakimanka", "live cameras", "Moscow", "HLS stream", "Moscow history"]
      homeInfoTitle = "Yakimanka: cameras and history"
      homeInfoDescription = "Live cameras, photos and notes about the Yakimanka district"

    [languages.en.menu]
      [[languages.en.menu.main]]
        name   = "Cameras"
        url    = "/en/cameras/"
        weight = 1
      [[languages.en.menu.main]]
        name   = "History"
        url    = "/en/history/"
        weight = 2
      [[languages.en.menu.main]]
        name   = "Photos"
        url    = "/en/galleries/"
        weight = 3
      [[languages.en.menu.main]]
        name   = "Blog"
        url    = "/en/posts/"
        weight = 4

[params]
  author = "Bolotnaya.online"
  description = "Онлайн-камеры, история и фото Болотной площади и района Якиманка. Live cameras of Bolotnaya Square, Moscow."
  keywords = ["Болотная площадь", "Якиманка", "онлайн камеры", "Bolotnaya", "Yakimanka", "Moscow live camera"]
  images = ["/images/placeholders/camera.svg"]
  mainSections = ["cameras", "posts", "history", "galleries"]
  DateFormat = "02.01.2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowBreadCrumbs = true
  ShowToc = false
  ShowPostNavLinks = false
  ShowFullTextinRSS = true
  ShowCodeCopyButtons = false
  hideSummary = false
  hideMeta = false
  # Performance: drop unused AOS (not referenced in templates)
  customCSS = [
    "/css/custom.css"
  ]
  customJS = [
    "/js/custom.js"
  ]
  env = "production"

[params.support]
  yoomoney_url = "https://yoomoney.ru/fundraise/YeyI3ANEDyA.230505"

[params.partner]
  name = "Beget"
  url = "https://beget.com/?id=754742"
  banner_img = "https://cp.beget.com/promo_data/static/970x90-12.png"
  banner_alt = "Beget — партнёр трансляции"

[params.contact]
  email = "info@bolotnaya.online"

[params.label]
  text = "Bolotnaya Online"

# Markup / goldmark security for safer HTML
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
